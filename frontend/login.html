<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAK Burgers</title>
    <link rel="icon" type="image" href="./asset/img/logo.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@latest/css/boxicons.min.css">
    <link rel="stylesheet" href="./asset/css/global.css">
    <link rel="stylesheet" href="./asset/css/predefined.css">
    <link rel="stylesheet" href="./asset/css/login.css?v=20260315-3">
    <link rel="stylesheet" href="./asset/css/style.css"> <!-- Import global header styles -->
    
</head>

<body class="login-page d-flex justify-content-center align-items-center h-100">
    <header>
        <a href="index.html" class="logo-wrap">
            <img src="./asset/img/logo.png" alt="HAK Burger Logo" class="logo">
        </a>
        <div class="bx bx-menu" id="menu-icon"></div>
        <ul class="navbar">
            <li><a href="index.html#home" class="nav-link">Home</a></li>
            <li><a href="index.html#about" class="nav-link">About Us</a></li>
            <li><a href="index.html#menu" class="nav-link">Menu</a></li>
            <li><a href="index.html#services" class="nav-link">Services</a></li>
            <li><a href="index.html#contact" class="nav-link">Contact Us</a></li>
            <li><a href="login.html" class="bttn active">Login</a></li>
            <li><div class="bx bx-moon" id="darkmode" title="Toggle dark mode"></div></li>
        </ul>
    </header>

    <main class="container login-shell">
        <div class="row d-flex justify-content-center align-items-center p-3">
            <form class="col-lg-5 col-md-6 col-sm-12 bg-white p-5 rounded-4 m-5 login-card" onsubmit="return false;" id="login-form">
                <div class="mb-1 text-center fw-bold h3 login-title">Welcome to our system</div>
                <p class="text-center login-subtitle mb-4">Sign in to manage HAK Burger operations.</p>

                <div class="mb-3">
                   
                    <select id="category-select" class="form-select login-field" aria-label="Select Category" name="category">
                        <option selected>Select category</option>
                        <option value="admin">Admin</option>
                        <option value="staff">Staff</option>
                    </select>
                    
                </div>

                <div class="mb-3">
                    <label for="txt-username" class="form-label">Username</label>
                    <input type="text" class="form-control login-field" placeholder="Enter your username" id="txt-username">
                </div>
                <div class="mb-5">
                    <label for="txt-password" class="form-label">Password</label>
                    <input type="password" class="form-control login-field" placeholder="Enter your password" id="txt-password">
                    <div class="text-danger mt-1" style="display: none;" id="msg-invalid-credentials">
                        Username or password is incorrect!
                    </div>
                </div>
                <div class="d-flex justify-content-center mb-4">
                    <button class="btn p-2 w-75 color-bg-primary color-txt-white fw-semibold login-btn" id="btn-login" type="submit">LOGIN</button>
                </div>

                
            </form>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.2.0/crypto-js.min.js"
        integrity="sha512-a+SUDuwNzXDvz4XrIcXHuCf089/iJAoN4lmrXJg18XnduKK6YlDHNRalv4yd1N40OKI80tFidF+rqTFKGPoWFQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="./asset/js/login.js?v=20260315-5"></script>
    <script src="./asset/js/main.js"></script>
</body>

</html>
